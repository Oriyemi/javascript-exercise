<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .hidden{
            display: none;
        }
         button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        cursor: pointer;
        background: #333;
        color: white;
        border-radius: 5px;
       }
       .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        max-width: 800px;
        margin: auto;
       }
       .gallery img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
       }
    </style>
    <div id="container">
       <div id="btn">
         <button id="nature">Nature</button>
         <button id="city">City</button>
       </div>
       <div class="gallery">
        <img src="./images/nature1.avif" alt="nature" class="card-nature  hidden">
        <img src="./images/city1.jpg" alt="city" class="card-city hidden">
        <img src="./images/nature2.jpg" alt="nature" class="card-nature hidden">
        <img src="./images/city2.jpg" alt="city" class="card-city hidden">
        <img src="./images/nature 3.jpg" alt="nature" class="card-nature hidden">
        <img src="./images/city3.jpg" alt="city" class="card-city hidden">
        <img src="./images/nature4.jpg" alt="nature" class="card-nature hidden">
        <img src="./images/city4.jpg" alt="city" class="card-city hidden">

       </div>

    </div>

     <script src="./script.js"></script>
</body>
</html>
