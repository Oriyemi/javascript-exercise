<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        /* body{
            background: #3b89f6;
        } */
        .hidden{
            display: none;
        }
    </style>
    <div  style="display: flex;justify-content: center;align-items: center; min-height: 100vh; ">
        <button id="deleteBtn"  style="min-width:125px; padding:12px 24px; border:none; border-radius:12px; background:#327aed; color:#fff; font-size:20px; cursor:pointer; " >Delete me</button>
    </div>

    

   <div id="wrapper">
    <div id="popupModal" class="hidden" style="position:fixed; inset:0; background:rgba(255,255,255,0.15); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); z-index:1000; font-family:Arial,sans-serif;">
     <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:420px; max-width:90%; background:#fff; border-radius:22px; box-shadow:0 12px 35px rgba(0,0,0,0.18); overflow:hidden;">
      <div style="position:relative; padding:24px 28px 18px 28px; border-bottom:1px solid #ececec;">
      <h1 style="margin:0; font-size:18px; color:#2f3342; font-weight:600; text-align:left;">Modal Window</h1>
      <button id="closeBtn" style="position:absolute; top:16px; right:18px; width:32px; height:32px; border:none; border-radius:50%; background:#f2f4f7; font-size:22px; cursor:pointer; color:#6b7280; line-height:32px;">×</button>
      </div>
      <div style="padding:22px 28px 30px 28px; text-align:left; color:#6b7280; font-size:15px; line-height:1.7; min-height:90px;">Are you sure you want to delete this file? If YES!! confirm, if NO!! cancel.</div>
      <div style="padding:0 28px 28px 28px; display:flex; justify-content:center; gap:14px;">
      <button style="min-width:125px; padding:12px 24px; border:none; border-radius:10px; background:#3b82f6; color:#fff; font-size:16px; cursor:pointer;">Confirm</button>
      <button style="min-width:125px; padding:12px 24px; border:none; border-radius:10px; background:#f1f2f6; color:#4b5563; font-size:16px; cursor:pointer;">Cancel</button>
    </div>
  </div>
  </div>
   </div>
    <script src="./modal.js"></script>
</body>
</html>
